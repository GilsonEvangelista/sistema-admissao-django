<!DOCTYPE html>
<html>

<head>

<title>Login - Sistema de Admissão</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
}

.login-box{
    width:350px;
    margin:120px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:#003366;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Admissão</h2>

<form method="post">

{% csrf_token %}

<input type="text" name="username" placeholder="Usuário">

<input type="password" name="password" placeholder="Senha">

<button type="submit">Entrar</button>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

</form>

</div>

</body>

</html>
